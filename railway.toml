# Railway — https://railway.app
# Guia: docs/RAILWAY.md
# Build com Docker (imagem limpa) — evita EBUSY/overlayfs do Railpack + rm node_modules.
# Volume opcional: monte em /app/data e SQLITE_DB_PATH=/app/data/cij.db

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
