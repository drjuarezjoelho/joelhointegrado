# Railway — https://railway.app
# Guia passo a passo: docs/RAILWAY.md
# Dockerfile na raiz faria a Railway ignorar este ficheiro; use deploy/Dockerfile para Docker manual.
# Volume opcional: monte em /app/data e SQLITE_DB_PATH=/app/data/cij.db

[build]
builder = "RAILPACK"
# Um único script npm — se o painel Railway tiver comando antigo, defina: npm run build:deploy
buildCommand = "npm run build:deploy"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
