# Railway — https://railway.app
# Guia passo a passo: docs/RAILWAY.md
# Dockerfile na raiz faria a Railway ignorar este ficheiro; use deploy/Dockerfile para Docker manual.
# Volume opcional: monte em /app/data e SQLITE_DB_PATH=/app/data/cij.db

[build]
builder = "RAILPACK"
# rm -rf node_modules evita árvore suja em rebuilds com cache; cache Vite está em .vite-cache (vite.config)
buildCommand = "rm -rf node_modules && npm ci && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
